name: Build Nexorha Enforcer APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install Dependencies
      run: npm install

    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: 'gradle'

    - name: Build Android Debug APK
      working-directory: android
      env:
        GRADLE_OPTS: -Xmx4096m -XX:MaxMetaspaceSize=512m
      # Added --stacktrace to force it to print the exact error
      run: |
        chmod +x gradlew
        ./gradlew assembleDebug --no-daemon --stacktrace

    - name: Upload Nexorha APK
      uses: actions/upload-artifact@v4
      if: success() # Only uploads if the build actually works
      with:
        name: Nexorha-Enforcer-APK
        path: android/app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Error Report
      uses: actions/upload-artifact@v4
      if: failure() # Only uploads if it crashes!
      with:
        name: Crash-Report
        path: android/app/build/reports/